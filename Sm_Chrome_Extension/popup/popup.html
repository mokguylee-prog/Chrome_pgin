<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMLEE Extension</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="card">
      <h1>SMLEE Extension</h1>
      <p id="currentTab" class="muted">현재 탭 정보를 불러오는 중...</p>
      <button id="toggleBtn" type="button">현재 페이지 하이라이트 토글</button>
      <button id="captureBtn" type="button" class="capture">화면 캡처 후 PNG 저장</button>
      <button id="optionsBtn" type="button" class="secondary">설정 열기</button>
      <p id="status" class="status" aria-live="polite"></p>
    </main>
    <script src="./popup.js"></script>
  </body>
</html>
